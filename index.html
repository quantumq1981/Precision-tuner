<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Precision Strobe Tuner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Courier New', monospace;
            background: #000;
            color: #00ff00;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px;
        }

        .app {
            width: 100%;
            max-width: 480px;
        }

        /* Header */
        h1 {
            text-align: center;
            font-size: 18px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 12px #00ff00;
            margin-bottom: 4px;
        }
        .subtitle {
            text-align: center;
            font-size: 10px;
            opacity: 0.5;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }

        /* Strobe circle */
        .strobe-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 12px;
        }
        #strobe-canvas {
            display: block;
            border-radius: 50%;
        }
        .strobe-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
        }
        .note-name {
            font-size: 52px;
            font-weight: bold;
            line-height: 1;
            text-shadow: 0 0 20px currentColor;
        }
        .note-octave {
            font-size: 22px;
            opacity: 0.8;
        }
        .play-hint {
            font-size: 11px;
            opacity: 0.4;
            letter-spacing: 2px;
            margin-top: 4px;
        }

        /* Readout row */
        .readout {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: #001a00;
            border: 1px solid #003300;
            margin-bottom: 10px;
        }
        .readout-item { text-align: center; }
        .readout-label { font-size: 9px; opacity: 0.5; letter-spacing: 1px; margin-bottom: 2px; }
        .readout-value { font-size: 20px; font-weight: bold; }
        .readout-value.freq { font-size: 16px; }

        /* Cents bar */
        .cents-bar-wrap {
            position: relative;
            height: 20px;
            background: #001a00;
            border: 1px solid #003300;
            margin-bottom: 12px;
        }
        .cents-bar-center {
            position: absolute;
            left: 50%;
            top: 0; bottom: 0;
            width: 2px;
            background: #005500;
            transform: translateX(-50%);
        }
        .cents-bar-ticks {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
        }
        .cents-bar-ticks span {
            position: absolute;
            top: 25%; bottom: 25%;
            width: 1px;
            background: #002200;
        }
        .cents-needle {
            position: absolute;
            top: 2px; bottom: 2px;
            width: 8px;
            border-radius: 2px;
            transform: translateX(-50%);
            left: 50%;
            transition: left 0.08s, background 0.08s;
            box-shadow: 0 0 8px currentColor;
        }

        /* String buttons */
        .string-row {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
            justify-content: center;
        }
        .string-btn {
            flex: 1;
            padding: 10px 4px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            font-weight: bold;
            background: #001a00;
            color: #00aa00;
            border: 1px solid #003300;
            cursor: pointer;
            text-align: center;
            letter-spacing: 1px;
            touch-action: manipulation;
        }
        .string-btn.active {
            background: #003300;
            color: #00ff00;
            border-color: #00ff00;
            box-shadow: 0 0 10px #00ff0044;
        }
        .string-btn .str-note { font-size: 15px; }
        .string-btn .str-freq { font-size: 9px; opacity: 0.6; display: block; margin-top: 2px; }

        /* Controls */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }
        .btn {
            padding: 14px 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            touch-action: manipulation;
        }
        .btn-start  { background: #00ff00; color: #000; box-shadow: 0 0 15px #00ff0055; }
        .btn-stop   { background: #cc0000; color: #fff; box-shadow: 0 0 15px #cc000055; }
        .btn-toggle {
            background: #001a00;
            color: #00aa00;
            border: 2px solid #003300;
        }
        .btn-toggle.active {
            background: #003300;
            color: #00ffaa;
            border-color: #00ffaa;
            box-shadow: 0 0 10px #00ffaa44;
        }
        .btn:disabled { opacity: 0.35; cursor: not-allowed; }

        /* Settings panel */
        .settings-panel {
            background: #001a00;
            border: 1px solid #003300;
            padding: 14px;
            margin-bottom: 12px;
            display: none;
        }
        .settings-panel.open { display: block; }
        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 12px;
        }
        .setting-row label { opacity: 0.8; }
        .setting-row input[type=range] {
            width: 130px;
            accent-color: #00ff00;
        }
        .setting-row input[type=number] {
            width: 70px;
            background: #000;
            color: #00ff00;
            border: 1px solid #003300;
            padding: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            text-align: center;
        }
        .setting-val { min-width: 40px; text-align: right; opacity: 0.8; }

        /* Status message */
        .status-msg {
            text-align: center;
            font-size: 11px;
            opacity: 0.6;
            letter-spacing: 2px;
            margin-bottom: 8px;
            min-height: 16px;
        }

        /* Permissions error */
        .error-box {
            background: #1a0000;
            border: 1px solid #660000;
            color: #ff4444;
            padding: 10px;
            font-size: 11px;
            text-align: center;
            margin-bottom: 10px;
            display: none;
        }
        .error-box.show { display: block; }
    </style>
</head>
<body>
<div class="app">
    <h1>Strobe Tuner</h1>
    <div class="subtitle">Precision Chromatic &bull; Guitar Edition</div>

    <div class="error-box" id="error-box">
        Microphone access denied. Please allow microphone access and reload.
    </div>

    <!-- Strobe display -->
    <div class="strobe-container">
        <canvas id="strobe-canvas" width="300" height="300"></canvas>
        <div class="strobe-overlay" id="strobe-overlay">
            <div class="note-name" id="note-name" style="color:#00ff00">--</div>
            <div class="note-octave" id="note-octave"></div>
            <div class="play-hint" id="play-hint">PLAY A NOTE</div>
        </div>
    </div>

    <!-- Readout -->
    <div class="readout">
        <div class="readout-item">
            <div class="readout-label">DETECTED</div>
            <div class="readout-value freq" id="freq-display">--- Hz</div>
        </div>
        <div class="readout-item">
            <div class="readout-label">CENTS</div>
            <div class="readout-value" id="cents-display" style="color:#00ff00">+0</div>
        </div>
        <div class="readout-item">
            <div class="readout-label">TARGET</div>
            <div class="readout-value freq" id="target-display">--- Hz</div>
        </div>
    </div>

    <!-- Cents bar -->
    <div class="cents-bar-wrap">
        <div class="cents-bar-ticks" id="cents-ticks"></div>
        <div class="cents-bar-center"></div>
        <div class="cents-needle" id="cents-needle"></div>
    </div>

    <!-- String selector -->
    <div class="string-row" id="string-row"></div>

    <!-- Controls -->
    <div class="controls">
        <button class="btn btn-start" id="btn-start">Start</button>
        <button class="btn btn-toggle" id="btn-notelock">Note Lock</button>
        <button class="btn btn-toggle" id="btn-settings">Settings</button>
    </div>

    <!-- Settings -->
    <div class="settings-panel" id="settings-panel">
        <div class="setting-row">
            <label>A4 Reference</label>
            <input type="number" id="ref-hz" value="440" min="380" max="500" step="0.5">
            <span class="setting-val">Hz</span>
        </div>
        <div class="setting-row">
            <label>Gain</label>
            <input type="range" id="gain-slider" min="1" max="8" step="0.5" value="2">
            <span class="setting-val" id="gain-val">×2</span>
        </div>
        <div class="setting-row">
            <label>Mode</label>
            <select id="mode-select" style="background:#000;color:#00ff00;border:1px solid #003300;padding:4px;font-family:monospace;font-size:12px;">
                <option value="guitar">Guitar (EADGBE)</option>
                <option value="chromatic">Chromatic</option>
            </select>
        </div>
    </div>

    <div class="status-msg" id="status-msg">Press START to begin</div>
</div>

<script type="module" src="./src/controller.js"></script>

</body>
</html>
