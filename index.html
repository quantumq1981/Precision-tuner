<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Precision Strobe Tuner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Courier New', monospace;
            background: #000;
            color: #00ff00;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px;
        }

        .app {
            width: 100%;
            max-width: 480px;
        }

        /* Header */
        h1 {
            text-align: center;
            font-size: 18px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 12px #00ff00;
            margin-bottom: 4px;
        }
        .subtitle {
            text-align: center;
            font-size: 10px;
            opacity: 0.5;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }

        /* Strobe circle */
        .strobe-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 12px;
        }
        #strobe-canvas {
            display: block;
            border-radius: 50%;
        }
        .strobe-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
        }
        .note-name {
            font-size: 52px;
            font-weight: bold;
            line-height: 1;
            text-shadow: 0 0 20px currentColor;
        }
        .note-octave {
            font-size: 22px;
            opacity: 0.8;
        }
        .play-hint {
            font-size: 11px;
            opacity: 0.4;
            letter-spacing: 2px;
            margin-top: 4px;
        }

        /* Readout row */
        .readout {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: #001a00;
            border: 1px solid #003300;
            margin-bottom: 10px;
        }
        .readout-item { text-align: center; }
        .readout-label { font-size: 9px; opacity: 0.5; letter-spacing: 1px; margin-bottom: 2px; }
        .readout-value { font-size: 20px; font-weight: bold; }
        .readout-value.freq { font-size: 16px; }

        /* Cents bar */
        .cents-bar-wrap {
            position: relative;
            height: 20px;
            background: #001a00;
            border: 1px solid #003300;
            margin-bottom: 12px;
        }
        .cents-bar-center {
            position: absolute;
            left: 50%;
            top: 0; bottom: 0;
            width: 2px;
            background: #005500;
            transform: translateX(-50%);
        }
        .cents-bar-ticks {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
        }
        .cents-bar-ticks span {
            position: absolute;
            top: 25%; bottom: 25%;
            width: 1px;
            background: #002200;
        }
        .cents-needle {
            position: absolute;
            top: 2px; bottom: 2px;
            width: 8px;
            border-radius: 2px;
            transform: translateX(-50%);
            left: 50%;
            transition: left 0.08s, background 0.08s;
            box-shadow: 0 0 8px currentColor;
        }

        /* String buttons */
        .string-row {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
            justify-content: center;
        }
        .string-btn {
            flex: 1;
            padding: 10px 4px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            font-weight: bold;
            background: #001a00;
            color: #00aa00;
            border: 1px solid #003300;
            cursor: pointer;
            text-align: center;
            letter-spacing: 1px;
            touch-action: manipulation;
        }
        .string-btn.active {
            background: #003300;
            color: #00ff00;
            border-color: #00ff00;
            box-shadow: 0 0 10px #00ff0044;
        }
        .string-btn .str-note { font-size: 15px; }
        .string-btn .str-freq { font-size: 9px; opacity: 0.6; display: block; margin-top: 2px; }

        /* Controls */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }
        .btn {
            padding: 14px 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            touch-action: manipulation;
        }
        .btn-start  { background: #00ff00; color: #000; box-shadow: 0 0 15px #00ff0055; }
        .btn-stop   { background: #cc0000; color: #fff; box-shadow: 0 0 15px #cc000055; }
        .btn-toggle {
            background: #001a00;
            color: #00aa00;
            border: 2px solid #003300;
        }
        .btn-toggle.active {
            background: #003300;
            color: #00ffaa;
            border-color: #00ffaa;
            box-shadow: 0 0 10px #00ffaa44;
        }
        .btn:disabled { opacity: 0.35; cursor: not-allowed; }

        /* Settings panel */
        .settings-panel {
            background: #001a00;
            border: 1px solid #003300;
            padding: 14px;
            margin-bottom: 12px;
            display: none;
        }
        .settings-panel.open { display: block; }
        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 12px;
        }
        .setting-row label { opacity: 0.8; }
        .setting-row input[type=range] {
            width: 130px;
            accent-color: #00ff00;
        }
        .setting-row input[type=number] {
            width: 70px;
            background: #000;
            color: #00ff00;
            border: 1px solid #003300;
            padding: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            text-align: center;
        }
        .setting-val { min-width: 40px; text-align: right; opacity: 0.8; }

        /* Status message */
        .status-msg {
            text-align: center;
            font-size: 11px;
            opacity: 0.6;
            letter-spacing: 2px;
            margin-bottom: 8px;
            min-height: 16px;
        }

        /* Permissions error */
        .error-box {
            background: #1a0000;
            border: 1px solid #660000;
            color: #ff4444;
            padding: 10px;
            font-size: 11px;
            text-align: center;
            margin-bottom: 10px;
            display: none;
        }
        .error-box.show { display: block; }
    </style>
</head>
<body>
<div class="app">
    <h1>Strobe Tuner</h1>
    <div class="subtitle">Precision Chromatic &bull; Guitar Edition</div>

    <div class="error-box" id="error-box">
        Microphone access denied. Please allow microphone access and reload.
    </div>

    <!-- Strobe display -->
    <div class="strobe-container">
        <canvas id="strobe-canvas" width="300" height="300"></canvas>
        <div class="strobe-overlay" id="strobe-overlay">
            <div class="note-name" id="note-name" style="color:#00ff00">--</div>
            <div class="note-octave" id="note-octave"></div>
            <div class="play-hint" id="play-hint">PLAY A NOTE</div>
        </div>
    </div>

    <!-- Readout -->
    <div class="readout">
        <div class="readout-item">
            <div class="readout-label">DETECTED</div>
            <div class="readout-value freq" id="freq-display">--- Hz</div>
        </div>
        <div class="readout-item">
            <div class="readout-label">CENTS</div>
            <div class="readout-value" id="cents-display" style="color:#00ff00">+0</div>
        </div>
        <div class="readout-item">
            <div class="readout-label">TARGET</div>
            <div class="readout-value freq" id="target-display">--- Hz</div>
        </div>
    </div>

    <!-- Cents bar -->
    <div class="cents-bar-wrap">
        <div class="cents-bar-ticks" id="cents-ticks"></div>
        <div class="cents-bar-center"></div>
        <div class="cents-needle" id="cents-needle"></div>
    </div>

    <!-- String selector -->
    <div class="string-row" id="string-row"></div>

    <!-- Controls -->
    <div class="controls">
        <button class="btn btn-start" id="btn-start">Start</button>
        <button class="btn btn-toggle" id="btn-notelock">Note Lock</button>
        <button class="btn btn-toggle" id="btn-settings">Settings</button>
    </div>

    <!-- Settings -->
    <div class="settings-panel" id="settings-panel">
        <div class="setting-row">
            <label>A4 Reference</label>
            <input type="number" id="ref-hz" value="440" min="380" max="500" step="0.5">
            <span class="setting-val">Hz</span>
        </div>
        <div class="setting-row">
            <label>Gain</label>
            <input type="range" id="gain-slider" min="1" max="8" step="0.5" value="2">
            <span class="setting-val" id="gain-val">×2</span>
        </div>
        <div class="setting-row">
            <label>Mode</label>
            <select id="mode-select" style="background:#000;color:#00ff00;border:1px solid #003300;padding:4px;font-family:monospace;font-size:12px;">
                <option value="guitar">Guitar (EADGBE)</option>
                <option value="chromatic">Chromatic</option>
            </select>
        </div>
    </div>

    <div class="status-msg" id="status-msg">Press START to begin</div>
</div>

<script>
// ─── Music Theory ────────────────────────────────────────────────────────────
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

function freqToMidi(freq) {
    return 69 + 12 * Math.log2(freq / 440);
}

function midiToFreq(midi, refA4 = 440) {
    return refA4 * Math.pow(2, (midi - 69) / 12);
}

function noteFromFreq(freq, refA4 = 440) {
    const midi = freqToMidi(freq);
    const rounded = Math.round(midi);
    const cents = (midi - rounded) * 100;
    const name = NOTE_NAMES[((rounded % 12) + 12) % 12];
    const octave = Math.floor(rounded / 12) - 1;
    const target = midiToFreq(rounded, refA4);
    return { name, octave, cents, target, midi: rounded };
}

// Guitar standard tuning strings
const GUITAR_STRINGS = [
    { label: 'E2', midi: 40 },
    { label: 'A2', midi: 45 },
    { label: 'D3', midi: 50 },
    { label: 'G3', midi: 55 },
    { label: 'B3', midi: 59 },
    { label: 'E4', midi: 64 },
];

// ─── YIN Pitch Detection ─────────────────────────────────────────────────────
// Threshold between 0.1 (strict) and 0.2 (lenient). 0.15 works well for guitar.
function yinDetect(buf, sampleRate, threshold = 0.15) {
    const N = buf.length;
    const half = Math.floor(N / 2);

    // Frequency bounds for guitar: 70 Hz – 1200 Hz
    const tauMin = Math.floor(sampleRate / 1200);
    const tauMax = Math.min(half, Math.floor(sampleRate / 70));

    // Step 1: Difference function (d)
    const d = new Float32Array(tauMax + 1);
    for (let tau = 1; tau <= tauMax; tau++) {
        let sum = 0;
        for (let j = 0; j < half; j++) {
            const diff = buf[j] - buf[j + tau];
            sum += diff * diff;
        }
        d[tau] = sum;
    }

    // Step 2: Cumulative mean normalized difference (cmnd)
    const cmnd = new Float32Array(tauMax + 1);
    cmnd[0] = 1;
    let runSum = 0;
    for (let tau = 1; tau <= tauMax; tau++) {
        runSum += d[tau];
        cmnd[tau] = runSum > 0 ? d[tau] * tau / runSum : 1;
    }

    // Step 3: First local minimum below threshold (search from tauMin)
    let tau = tauMin;
    while (tau <= tauMax) {
        if (cmnd[tau] < threshold) {
            // Slide to the actual minimum of this valley
            while (tau + 1 <= tauMax && cmnd[tau + 1] < cmnd[tau]) tau++;
            break;
        }
        tau++;
    }

    if (tau > tauMax) return { freq: -1, confidence: 0 };

    // Step 4: Parabolic interpolation for sub-sample accuracy
    const x0 = Math.max(1, tau - 1);
    const x2 = Math.min(tauMax, tau + 1);
    let betterTau;
    if (x0 === tau) {
        betterTau = cmnd[tau] <= cmnd[x2] ? tau : x2;
    } else if (x2 === tau) {
        betterTau = cmnd[tau] <= cmnd[x0] ? tau : x0;
    } else {
        const s0 = cmnd[x0], s1 = cmnd[tau], s2 = cmnd[x2];
        const denom = 2 * (2 * s1 - s2 - s0);
        betterTau = denom !== 0 ? tau + (s2 - s0) / denom : tau;
    }

    const freq = sampleRate / betterTau;
    const confidence = 1 - cmnd[tau]; // 0–1, higher = more confident
    return { freq, confidence };
}

// ─── App State ────────────────────────────────────────────────────────────────
const state = {
    running: false,
    noteLock: false,
    lockedMidi: null,       // midi note locked when note-lock is ON
    refA4: 440,
    gain: 2,
    mode: 'guitar',
    activeString: null,     // index into GUITAR_STRINGS, or null = chromatic

    // Display
    detectedFreq: 0,
    detectedNote: null,
    strobePhase: 0,
    lastFrameTime: 0,
    animFrameId: null,

    // Audio
    audioCtx: null,
    analyser: null,
    gainNode: null,
    stream: null,
    timeBuf: null,
};

// ─── DOM References ───────────────────────────────────────────────────────────
const canvas    = document.getElementById('strobe-canvas');
const ctx2d     = canvas.getContext('2d');
const elNote    = document.getElementById('note-name');
const elOctave  = document.getElementById('note-octave');
const elHint    = document.getElementById('play-hint');
const elFreq    = document.getElementById('freq-display');
const elCents   = document.getElementById('cents-display');
const elTarget  = document.getElementById('target-display');
const elNeedle  = document.getElementById('cents-needle');
const elStatus  = document.getElementById('status-msg');
const elError   = document.getElementById('error-box');
const btnStart  = document.getElementById('btn-start');
const btnLock   = document.getElementById('btn-notelock');
const btnSett   = document.getElementById('btn-settings');
const settPanel = document.getElementById('settings-panel');
const refHzEl   = document.getElementById('ref-hz');
const gainSlider = document.getElementById('gain-slider');
const gainValEl = document.getElementById('gain-val');
const modeSelect = document.getElementById('mode-select');
const stringRow = document.getElementById('string-row');

// ─── Build cents-bar ticks ─────────────────────────────────────────────────
(function buildTicks() {
    const container = document.getElementById('cents-ticks');
    for (let c = -50; c <= 50; c += 10) {
        const s = document.createElement('span');
        s.style.left = ((c + 50) / 100 * 100) + '%';
        container.appendChild(s);
    }
})();

// ─── Build guitar string buttons ──────────────────────────────────────────
function buildStringButtons() {
    stringRow.innerHTML = '';
    GUITAR_STRINGS.forEach((gs, i) => {
        const btn = document.createElement('button');
        btn.className = 'string-btn' + (state.activeString === i ? ' active' : '');
        const freq = midiToFreq(gs.midi, state.refA4);
        btn.innerHTML = `<span class="str-note">${gs.label}</span>
                         <span class="str-freq">${freq.toFixed(1)}Hz</span>`;
        btn.addEventListener('click', () => {
            if (state.mode !== 'guitar') return;
            state.activeString = state.activeString === i ? null : i;
            buildStringButtons();
            if (state.activeString !== null) {
                state.lockedMidi = GUITAR_STRINGS[state.activeString].midi;
            }
        });
        stringRow.appendChild(btn);
    });
}

// ─── Strobe Rendering ────────────────────────────────────────────────────────
const RINGS = [
    { segs: 12, gap: 0.12 },  // fundamental
    { segs: 18, gap: 0.10 },  // 2nd harmonic
    { segs: 24, gap: 0.09 },  // 3rd harmonic
    { segs: 30, gap: 0.08 },  // 4th harmonic
];

function renderStrobe(cents, hasSignal) {
    const dpr    = window.devicePixelRatio || 1;
    const cssW   = canvas.parentElement.offsetWidth || 300;
    const SIZE   = Math.min(cssW, 300);
    if (canvas.width !== SIZE * dpr || canvas.height !== SIZE * dpr) {
        canvas.width  = SIZE * dpr;
        canvas.height = SIZE * dpr;
        canvas.style.width  = SIZE + 'px';
        canvas.style.height = SIZE + 'px';
    }
    ctx2d.save();
    ctx2d.scale(dpr, dpr);

    const cx = SIZE / 2, cy = SIZE / 2;
    const maxR = SIZE / 2 - 4;

    // Background circle
    ctx2d.clearRect(0, 0, SIZE, SIZE);
    ctx2d.fillStyle = '#050f05';
    ctx2d.beginPath();
    ctx2d.arc(cx, cy, maxR, 0, Math.PI * 2);
    ctx2d.fill();

    // Pick color from cents
    let r = 0, g = 255, b = 0;
    if (hasSignal) {
        const a = Math.abs(cents);
        if (a < 5) {
            r = 0; g = 255; b = 0;           // green = in tune
        } else if (cents > 0) {
            r = 255; g = Math.max(0, 255 - (a - 5) * 8); b = 0; // orange/red = sharp
        } else {
            r = 0; g = Math.max(0, 255 - (a - 5) * 6); b = 255; // blue = flat
        }
    }

    // Draw rings
    const centerR  = maxR * 0.20;
    const ringBand = (maxR - centerR) / RINGS.length;

    RINGS.forEach((ring, h) => {
        const innerR = centerR + h * ringBand + ringBand * 0.08;
        const outerR = centerR + (h + 1) * ringBand - ringBand * 0.08;
        const brightness = hasSignal ? (1 - h * 0.15) : 0.25;
        // Harmonics rotate faster
        const phase = state.strobePhase * (h + 1);
        const segAngle = (Math.PI * 2) / ring.segs;

        for (let s = 0; s < ring.segs; s++) {
            if (s % 2 === 0) {
                const a0 = s * segAngle + phase + ring.gap;
                const a1 = (s + 1) * segAngle + phase - ring.gap;
                ctx2d.beginPath();
                ctx2d.arc(cx, cy, outerR, a0, a1);
                ctx2d.arc(cx, cy, innerR, a1, a0, true);
                ctx2d.closePath();
                ctx2d.fillStyle = `rgba(${r},${g},${b},${brightness})`;
                ctx2d.fill();
            }
        }
    });

    // Outer border ring
    ctx2d.strokeStyle = `rgba(${r},${g},${b},0.5)`;
    ctx2d.lineWidth = 2;
    ctx2d.beginPath();
    ctx2d.arc(cx, cy, maxR - 1, 0, Math.PI * 2);
    ctx2d.stroke();

    ctx2d.restore();
}

// ─── Update UI readouts ───────────────────────────────────────────────────────
function updateReadout(note, freq, hasSignal) {
    if (!hasSignal || !note) {
        elNote.textContent   = '--';
        elOctave.textContent = '';
        elHint.textContent   = state.running ? 'PLAY A NOTE' : '';
        elFreq.textContent   = '--- Hz';
        elCents.textContent  = '+0';
        elTarget.textContent = '--- Hz';
        elNote.style.color   = '#00ff00';
        elCents.style.color  = '#00ff00';
        elNeedle.style.left  = '50%';
        elNeedle.style.background = '#00ff00';
        return;
    }

    const cents = note.cents;
    const a     = Math.abs(cents);
    const color = a < 5 ? '#00ff00' : (a < 15 ? '#ffcc00' : (cents > 0 ? '#ff4400' : '#44aaff'));

    elNote.textContent   = note.name;
    elOctave.textContent = note.octave;
    elHint.textContent   = a < 3 ? 'IN TUNE' : (cents > 0 ? 'SHARP' : 'FLAT');
    elNote.style.color   = color;

    elFreq.textContent   = freq.toFixed(2) + ' Hz';
    elCents.textContent  = (cents >= 0 ? '+' : '') + cents.toFixed(1);
    elCents.style.color  = color;
    elTarget.textContent = note.target.toFixed(2) + ' Hz';

    // Needle: 0% = -50 cents, 100% = +50 cents
    const pct = Math.max(0, Math.min(100, (cents + 50)));
    elNeedle.style.left       = pct + '%';
    elNeedle.style.background = color;
    elNeedle.style.boxShadow  = `0 0 8px ${color}`;
}

// ─── Animation Loop ───────────────────────────────────────────────────────────
function animate(ts) {
    state.animFrameId = requestAnimationFrame(animate);

    const dt = state.lastFrameTime > 0 ? Math.min((ts - state.lastFrameTime) / 1000, 0.05) : 0.016;
    state.lastFrameTime = ts;

    // Read audio if running
    let freq = 0, confidence = 0;
    if (state.running && state.analyser && state.timeBuf) {
        state.analyser.getFloatTimeDomainData(state.timeBuf);

        // RMS signal level
        let rms = 0;
        for (let i = 0; i < state.timeBuf.length; i++) rms += state.timeBuf[i] ** 2;
        rms = Math.sqrt(rms / state.timeBuf.length);

        if (rms > 0.005) {
            const result = yinDetect(state.timeBuf, state.audioCtx.sampleRate);
            freq       = result.freq;
            confidence = result.confidence;
        }
    }

    const hasSignal = freq > 70 && freq < 1200 && confidence > 0.5;
    let displayNote = null;

    if (hasSignal) {
        // Note-lock / string mode: snap to nearest allowed note
        if (state.mode === 'guitar' && state.activeString !== null) {
            // Force target to selected string's note
            const targetMidi = GUITAR_STRINGS[state.activeString].midi;
            const targetFreq = midiToFreq(targetMidi, state.refA4);
            const detectedMidi = 69 + 12 * Math.log2(freq / state.refA4);
            const centsOff = (detectedMidi - targetMidi) * 100;
            // Only show if within ±100 cents of this string
            if (Math.abs(centsOff) <= 100) {
                displayNote = {
                    name: GUITAR_STRINGS[state.activeString].label.replace(/\d/, ''),
                    octave: GUITAR_STRINGS[state.activeString].label.match(/\d/)[0],
                    cents: centsOff,
                    target: targetFreq,
                };
            } else {
                // Out of range for this string – use chromatic
                displayNote = noteFromFreq(freq, state.refA4);
            }
        } else if (state.noteLock && state.lockedMidi !== null) {
            // Note-lock: bias toward locked note
            const targetFreq = midiToFreq(state.lockedMidi, state.refA4);
            const detectedMidi = 69 + 12 * Math.log2(freq / state.refA4);
            const centsOff = (detectedMidi - state.lockedMidi) * 100;
            if (Math.abs(centsOff) <= 70) {
                const nm = NOTE_NAMES[((state.lockedMidi % 12) + 12) % 12];
                const oct = Math.floor(state.lockedMidi / 12) - 1;
                displayNote = { name: nm, octave: oct, cents: centsOff, target: targetFreq };
            } else {
                displayNote = noteFromFreq(freq, state.refA4);
            }
        } else {
            displayNote = noteFromFreq(freq, state.refA4);
            // Auto-update lockedMidi so note-lock sticks to most recent note
            if (state.noteLock && displayNote) {
                state.lockedMidi = displayNote.midi;
            }
        }
    }

    // Update strobe phase
    // 1 rotation/s when 100 cents off. Multiplied by PI*2 so phase is in radians.
    if (hasSignal && displayNote) {
        state.strobePhase += (displayNote.cents / 100) * Math.PI * 2 * dt;
    }

    renderStrobe(displayNote ? displayNote.cents : 0, hasSignal && displayNote !== null);
    updateReadout(displayNote, freq, hasSignal && displayNote !== null);
}

// ─── Audio Setup ──────────────────────────────────────────────────────────────
async function startAudio() {
    elError.classList.remove('show');
    try {
        // Request stereo mono microphone, prefer high quality
        const constraints = {
            audio: {
                echoCancellation: false,
                noiseSuppression: false,
                autoGainControl:  false,
                channelCount: 1,
            }
        };
        state.stream    = await navigator.mediaDevices.getUserMedia(constraints);
        state.audioCtx  = new (window.AudioContext || window.webkitAudioContext)();

        const source = state.audioCtx.createMediaStreamSource(state.stream);

        // Gain node (user-adjustable boost for quiet instruments)
        state.gainNode = state.audioCtx.createGain();
        state.gainNode.gain.value = state.gain;

        // High-pass at 60 Hz to remove rumble
        const hp = state.audioCtx.createBiquadFilter();
        hp.type = 'highpass';
        hp.frequency.value = 60;
        hp.Q.value = 0.5;

        // Low-pass at 1400 Hz (2× highest guitar open string + headroom)
        const lp = state.audioCtx.createBiquadFilter();
        lp.type = 'lowpass';
        lp.frequency.value = 1400;
        lp.Q.value = 0.5;

        state.analyser = state.audioCtx.createAnalyser();
        state.analyser.fftSize = 4096;
        state.analyser.smoothingTimeConstant = 0;

        source.connect(hp);
        hp.connect(lp);
        lp.connect(state.gainNode);
        state.gainNode.connect(state.analyser);

        state.timeBuf = new Float32Array(state.analyser.fftSize);
        state.running = true;
        elStatus.textContent = 'LISTENING — play any note';
        btnStart.textContent = 'Stop';
        btnStart.className   = 'btn btn-stop';
    } catch (e) {
        elError.classList.add('show');
        elStatus.textContent = 'Microphone access failed';
        console.error(e);
    }
}

function stopAudio() {
    state.running = false;
    if (state.stream) { state.stream.getTracks().forEach(t => t.stop()); state.stream = null; }
    if (state.audioCtx) { state.audioCtx.close(); state.audioCtx = null; }
    state.analyser  = null;
    state.gainNode  = null;
    state.timeBuf   = null;
    state.detectedFreq = 0;
    btnStart.textContent = 'Start';
    btnStart.className   = 'btn btn-start';
    elStatus.textContent = 'Press START to begin';
}

// ─── Event Listeners ──────────────────────────────────────────────────────────
btnStart.addEventListener('click', () => {
    if (state.running) stopAudio();
    else startAudio();
});

btnLock.addEventListener('click', () => {
    state.noteLock = !state.noteLock;
    btnLock.classList.toggle('active', state.noteLock);
    if (state.noteLock && !state.lockedMidi) {
        // If nothing locked yet, lock to A4
        state.lockedMidi = 69;
    }
    elStatus.textContent = state.noteLock ? 'NOTE LOCK ON' : 'NOTE LOCK OFF';
});

btnSett.addEventListener('click', () => {
    const open = settPanel.classList.toggle('open');
    btnSett.classList.toggle('active', open);
});

refHzEl.addEventListener('change', () => {
    const v = parseFloat(refHzEl.value);
    if (v >= 380 && v <= 500) {
        state.refA4 = v;
        buildStringButtons();
    }
});

gainSlider.addEventListener('input', () => {
    state.gain = parseFloat(gainSlider.value);
    gainValEl.textContent = '×' + state.gain;
    if (state.gainNode) state.gainNode.gain.value = state.gain;
});

modeSelect.addEventListener('change', () => {
    state.mode = modeSelect.value;
    stringRow.style.display = state.mode === 'guitar' ? 'flex' : 'none';
    if (state.mode !== 'guitar') state.activeString = null;
    buildStringButtons();
});

// ─── Boot ─────────────────────────────────────────────────────────────────────
buildStringButtons();
requestAnimationFrame(animate);
</script>
</body>
</html>
